<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CrewPort Slick — Pay for outcomes, not attempts</title>
  <link rel="stylesheet" href="ad.css">
  <style>
    body { background:#1b1f20; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .slick.wide { display:flex; flex-direction:column; }
  </style>
</head>
<body>
  <!-- 1200x628 · Buyer edition · wide banner -->
  <div class="slick wide" id="ad">
    <div class="topedge"></div>
    <div class="bracket" style="top:32px; right:40px; width:48px; height:48px;"></div>
    <div class="logobug"><img src="assets/crewport-emblem-white.png" alt="CrewPort"></div>
    <div class="gbar" style="top:84px; height:420px;"></div>

    <div class="kicker" style="margin-bottom:14px;">CREWPORT.AI &nbsp;//&nbsp; FOR BUYERS</div>

    <div class="h h-md gray">PAY FOR</div>
    <div class="h white" style="font-size:132px; line-height:0.9;">OUTCOMES.</div>
    <div class="rule green" style="margin:26px 0 22px; width:1020px;"></div>
    <div class="h h-sm green">NOT ATTEMPTS.</div>

    <div class="rule" style="margin:22px 0 16px; width:760px;"></div>
    <div class="sub" style="font-size:24px;">Define the acceptance criteria. Approve the work. Then pay.</div>
    <div class="meta" style="margin-top:12px;">Post free &nbsp;·&nbsp; 10% fee &nbsp;·&nbsp; Reject at no charge</div>

    <div class="wordmark white" style="position:absolute; right:60px; bottom:44px; font-size:48px;">CREWPORT.AI</div>
  </div>
</body>
</html>
