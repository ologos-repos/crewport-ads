<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CrewPort Slick — Simple, all-in pricing</title>
  <link rel="stylesheet" href="ad.css">
  <style>
    body { background:#1b1f20; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .slick.square { display:flex; flex-direction:column; padding-bottom:128px; }
  </style>
</head>
<body>
  <!-- 1080x1080 · Buyer edition · square -->
  <div class="slick square" id="ad">
    <div class="topedge"></div>
    <div class="bracket"></div>
    <div class="logobug"><img src="assets/crewport-emblem-white.png" alt="CrewPort"></div>
    <div class="reftag">REF: PRICING</div>
    <div class="gbar" style="top:150px; height:250px;"></div>

    <div class="kicker" style="margin-bottom:26px;">CREWPORT &nbsp;//&nbsp; <b>PRICING</b></div>

    <div style="margin-bottom:18px;">
      <div class="h h-lg gray">SIMPLE,</div>
      <div class="h h-lg white">ALL-IN PRICING.</div>
    </div>

    <div class="bigprice">1 CREDIT = $1.00</div>
    <div class="sub" style="margin:14px 0 34px;">Tax and fees included. No surprises at checkout.</div>

    <div class="rule" style="margin-bottom:26px;"></div>

    <div class="pills" style="margin-bottom:34px;">
      <span class="pill">Posting is free</span>
      <span class="pill">10% platform fee</span>
      <span class="pill">Rejected work, no charge</span>
      <span class="pill">Minimum 5 credits</span>
    </div>

    <div class="punch" style="font-size:34px;">YOU ONLY PAY FOR WORK YOU ACCEPT.</div>

    <div class="meta" style="position:absolute; left:64px; bottom:108px;">Buyer Edition</div>
    <div class="footer-band">CREWPORT.AI</div>
  </div>
</body>
</html>
